<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FakeStore - Criar Conta</title>
    <link rel="stylesheet" href="../styles/criarUsuario.css">
</head>
<body>
    <div class="container">
        <div class="register-box">

            <div class="logo">
                <h1>🛍️ FakeStore</h1>
                <p>Crie sua conta gratuitamente</p>
            </div>

            <form id="registerForm">

                <div class="input-group">
                    <label for="name">Nome completo</label>
                    <input type="text" id="name" placeholder="Digite seu nome" required>
                    <span class="input-icon">👤</span>
                </div>


                <div class="input-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" placeholder="seu@email.com" required>
                    <span class="input-icon">📧</span>
                </div>

                <div class="input-group">
                    <label for="password">Senha</label>
                    <input type="password" id="password" placeholder="Mínimo 6 caracteres" required minlength="6">
                    <span class="input-icon">🔒</span>
                    <span class="password-toggle" id="togglePassword">👁️</span>
                </div>

                <div class="input-group">
                    <label for="confirmPassword">Confirmar senha</label>
                    <input type="password" id="confirmPassword" placeholder="Digite novamente" required>
                    <span class="input-icon">✅</span>
                </div>

                <button type="submit" class="btn-register">Criar conta</button>

                <div class="login-link">
                    <p>Já tem uma conta? <a href="login.html">Faça login</a></p>
                </div>
            </form>

            <div class="demo-info">
                <p>🔑 Após criar, use suas credenciais para fazer login</p>
            </div>
        </div>
    </div>


    <dialog id="meuModal">
    </dialog>

    <script src="../js/criarUsuario.js"></script>
</body>
</html>
